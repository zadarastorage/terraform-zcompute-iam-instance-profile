name: Integration Tests

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - 'tests/**'
      - '.github/workflows/integration-test.yml'
      - '.github/scripts/**'
  push:
    branches: [main]
    paths:
      - '**.tf'
      - 'tests/**'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-credentials:
    name: Check Credentials
    runs-on: ubuntu-latest
    outputs:
      has_credentials: ${{ steps.check.outputs.has_credentials }}
    steps:
      - name: Check for zCompute credentials
        id: check
        env:
          ZCOMPUTE_ENDPOINT: ${{ secrets.ZCOMPUTE_ENDPOINT }}
          ZCOMPUTE_ACCESS_KEY: ${{ secrets.ZCOMPUTE_ACCESS_KEY }}
          ZCOMPUTE_SECRET_KEY: ${{ secrets.ZCOMPUTE_SECRET_KEY }}
        run: |
          if [ -n "$ZCOMPUTE_ENDPOINT" ] && [ -n "$ZCOMPUTE_ACCESS_KEY" ] && [ -n "$ZCOMPUTE_SECRET_KEY" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
            echo "All zCompute credentials are configured"
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
            echo "::warning::Integration tests skipped - zCompute credentials not configured."
            [ -z "$ZCOMPUTE_ENDPOINT" ] && echo "::warning::Missing secret: ZCOMPUTE_ENDPOINT"
            [ -z "$ZCOMPUTE_ACCESS_KEY" ] && echo "::warning::Missing secret: ZCOMPUTE_ACCESS_KEY"
            [ -z "$ZCOMPUTE_SECRET_KEY" ] && echo "::warning::Missing secret: ZCOMPUTE_SECRET_KEY"
          fi

  # ================================================================
  # Simple lifecycle: create → destroy (uses module defaults)
  # ================================================================
  simple-lifecycle:
    name: Simple Lifecycle (create + destroy)
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.has_credentials == 'true'
    timeout-minutes: 15

    env:
      TF_VAR_zcompute_endpoint_url: ${{ secrets.ZCOMPUTE_ENDPOINT }}
      TF_VAR_zcompute_access_key: ${{ secrets.ZCOMPUTE_ACCESS_KEY }}
      TF_VAR_zcompute_secret_key: ${{ secrets.ZCOMPUTE_SECRET_KEY }}
      TF_VAR_name_suffix: ${{ github.run_id }}-simple

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Init
        working-directory: tests/integration
        run: terraform init -input=false

      - name: Apply
        working-directory: tests/integration
        run: |
          terraform apply -auto-approve -input=false
          echo "::notice::Resources created successfully"

      - name: Destroy
        if: always()
        working-directory: tests/integration
        run: |
          terraform destroy -auto-approve -input=false
          echo "::notice::Resources destroyed successfully"

  # ================================================================
  # Recreate with delay: create → destroy → recreate
  # Uses module defaults (destroy_delay_seconds=360)
  # ================================================================
  recreate-with-delay:
    name: Recreate with delay (create + destroy + recreate)
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.has_credentials == 'true'
    timeout-minutes: 25

    env:
      TF_VAR_zcompute_endpoint_url: ${{ secrets.ZCOMPUTE_ENDPOINT }}
      TF_VAR_zcompute_access_key: ${{ secrets.ZCOMPUTE_ACCESS_KEY }}
      TF_VAR_zcompute_secret_key: ${{ secrets.ZCOMPUTE_SECRET_KEY }}
      TF_VAR_name_suffix: ${{ github.run_id }}-delay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Init
        working-directory: tests/integration
        run: terraform init -input=false

      - name: Create
        working-directory: tests/integration
        run: |
          terraform apply -auto-approve -input=false
          echo "::notice::Resources created"

      - name: Destroy (with delay)
        working-directory: tests/integration
        run: |
          terraform destroy -auto-approve -input=false
          echo "::notice::Destroy complete (includes consistency delay)"

      - name: Recreate
        id: recreate
        working-directory: tests/integration
        run: |
          rm -f terraform.tfstate terraform.tfstate.backup
          terraform init -input=false
          terraform apply -auto-approve -input=false
          echo "::notice::Recreate succeeded"

      - name: Report
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### Recreate with delay

          | Step | Result |
          |------|--------|
          | Create | success |
          | Destroy (with consistency delay) | success |
          | Recreate | **${{ steps.recreate.outcome }}** |
          EOF

      - name: Final cleanup
        if: always()
        working-directory: tests/integration
        run: terraform destroy -auto-approve -input=false 2>&1 || true

  # ================================================================
  # Recreate without delay: create → destroy → recreate
  # Overrides delays to 0 — tests raw behavior without workaround.
  # Reports red but does not block CI (continue-on-error).
  # ================================================================
  recreate-without-delay:
    name: Recreate without delay (create + destroy + recreate)
    runs-on: ubuntu-latest
    needs: check-credentials
    if: needs.check-credentials.outputs.has_credentials == 'true'
    timeout-minutes: 10
    continue-on-error: true

    env:
      TF_VAR_zcompute_endpoint_url: ${{ secrets.ZCOMPUTE_ENDPOINT }}
      TF_VAR_zcompute_access_key: ${{ secrets.ZCOMPUTE_ACCESS_KEY }}
      TF_VAR_zcompute_secret_key: ${{ secrets.ZCOMPUTE_SECRET_KEY }}
      TF_VAR_name_suffix: ${{ github.run_id }}-nodelay
      TF_VAR_destroy_delay_seconds: "0"
      TF_VAR_create_delay_seconds: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Init
        working-directory: tests/integration
        run: terraform init -input=false

      - name: Create
        working-directory: tests/integration
        run: |
          terraform apply -auto-approve -input=false
          echo "::notice::Resources created"

      - name: Destroy (no delay)
        working-directory: tests/integration
        run: |
          terraform destroy -auto-approve -input=false
          echo "::notice::Destroy complete (no consistency delay)"

      - name: Recreate
        id: recreate
        working-directory: tests/integration
        run: |
          rm -f terraform.tfstate terraform.tfstate.backup
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Report
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### Recreate without delay

          | Step | Result |
          |------|--------|
          | Create | success |
          | Destroy (no delay) | success |
          | Recreate | **${{ steps.recreate.outcome }}** |
          EOF

      - name: Final cleanup
        if: always()
        working-directory: tests/integration
        run: terraform destroy -auto-approve -input=false 2>&1 || true

  # ================================================================
  # Summary
  # ================================================================
  summary:
    name: Integration Test Summary
    runs-on: ubuntu-latest
    needs: [check-credentials, simple-lifecycle, recreate-with-delay, recreate-without-delay]
    if: always()
    steps:
      - name: Aggregate results
        id: aggregate
        run: |
          SIMPLE="${{ needs.simple-lifecycle.result }}"
          WITH_DELAY="${{ needs.recreate-with-delay.result }}"
          WITHOUT_DELAY="${{ needs.recreate-without-delay.result }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Integration Test Results

          | Test | Result |
          |------|--------|
          | Simple Lifecycle | ${SIMPLE} |
          | Recreate with delay | ${WITH_DELAY} |
          | Recreate without delay | ${WITHOUT_DELAY} |
          EOF

          # CI passes if simple lifecycle and recreate-with-delay both pass
          # recreate-without-delay is informational (continue-on-error)
          if [ "$SIMPLE" = "success" ] && [ "$WITH_DELAY" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          elif [ "$SIMPLE" = "skipped" ]; then
            echo "status=skipped" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Fail if required tests failed
        if: steps.aggregate.outputs.status == 'failed'
        run: |
          echo "::error::Required integration tests failed"
          exit 1
